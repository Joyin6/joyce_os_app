<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JoyceOS - Your Life Command Center</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap');

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, #fff5f9 0%, #ffe5f0 100%);
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: 340px;
      background: white;
      border-right: 2px solid #FFB6D9;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 20px rgba(255, 182, 217, 0.1);
    }

    .sidebar-header {
      padding: 24px;
      border-bottom: 2px solid #FFE5F0;
    }

    .sidebar-header h2 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #E63384 0%, #D946A6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .sidebar-header p {
      font-size: 12px;
      color: #D946A6;
      margin: 0;
    }

    .tab-buttons {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: #FFF0F7;
      border-bottom: 2px solid #FFE5F0;
    }

    .tab-btn {
      flex: 1;
      padding: 8px;
      border: 2px solid #FFB6D9;
      background: white;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      border-color: #E63384;
      background: #FFE5F0;
      color: #E63384;
    }

    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
    }

    .task-item {
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid;
    }

    .task-item.high {
      background: #FFE5F0;
      border-color: #F71D8F;
    }

    .task-item.high:hover {
      transform: translateX(4px);
    }

    .task-text {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .task-meta {
      font-size: 11px;
      opacity: 0.7;
    }

    /* Main Chat Area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .main-header {
      padding: 20px;
      border-bottom: 2px solid #FFE5F0;
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(90deg, #FFF5F9 0%, #FFE5F0 100%);
    }

    .main-header h1 {
      font-size: 20px;
      font-weight: 700;
      color: #E63384;
      margin: 0;
    }

    .main-header p {
      font-size: 12px;
      color: #D946A6;
      margin: 2px 0 0 0;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      display: flex;
      gap: 8px;
    }

    .message.user {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 70%;
      padding: 14px 18px;
      border-radius: 20px;
      line-height: 1.5;
      font-size: 14px;
    }

    .message.user .message-bubble {
      background: linear-gradient(135deg, #E63384 0%, #D946A6 100%);
      color: white;
      box-shadow: 0 4px 12px rgba(230, 51, 132, 0.2);
    }

    .message.assistant .message-bubble {
      background: #FFF0F7;
      color: #333;
      border: 2px solid #FFB6D9;
    }

    .input-form {
      padding: 20px;
      border-top: 2px solid #FFE5F0;
      display: flex;
      gap: 12px;
    }

    .input-form input {
      flex: 1;
      border: 2px solid #FFB6D9;
      border-radius: 20px;
      padding: 12px 18px;
      font-size: 14px;
      font-family: inherit;
      background: #FFF5F9;
      transition: all 0.2s;
      outline: none;
    }

    .input-form input:focus {
      border-color: #E63384;
      background: white;
    }

    .input-form button {
      background: linear-gradient(135deg, #E63384 0%, #D946A6 100%);
      color: white;
      border: none;
      border-radius: 20px;
      padding: 12px 24px;
      cursor: pointer;
      font-weight: 600;
      transition: transform 0.2s;
    }

    .input-form button:hover {
      transform: scale(1.05);
    }

    .input-form button:active {
      transform: scale(0.98);
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    .loading-dot {
      width: 8px;
      height: 8px;
      background: #E63384;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    .loading-dots {
      display: flex;
      gap: 6px;
      padding: 12px 18px;
    }

    .empty-state {
      color: #999;
      font-size: 13px;
      text-align: center;
      padding: 24px 12px;
    }

    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #FFF5F9;
    }

    ::-webkit-scrollbar-thumb {
      background: #FFB6D9;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #E63384;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <h2>💕 JoyceOS</h2>
        <p>Your life, organized</p>
      </div>

      <div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('today')">Today</button>
        <button class="tab-btn" onclick="switchTab('schedule')">Schedule</button>
      </div>

      <div class="sidebar-content" id="sidebarContent">
        <div class="empty-state">Loading your schedule...</div>
      </div>
    </div>

    <!-- Main Chat -->
    <div class="main">
      <div class="main-header">
        <div>
          <h1>Hey gorgeous! 💕</h1>
          <p id="headerSubtitle">Tell me about your schedule</p>
        </div>
      </div>

      <div class="messages" id="messages">
        <div class="message assistant">
          <div class="message-bubble">
            Good morning gorgeous! 💕 I'm here to help you stay sane through this. What can I help you with today?
          </div>
        </div>
      </div>

      <form class="input-form" onsubmit="handleSubmit(event)">
        <input 
          type="text" 
          id="messageInput"
          placeholder="Add a task, update your day, anything..." 
          autocomplete="off"
        >
        <button type="submit">Send</button>
      </form>
    </div>
  </div>

  <script>
    // Initialize
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('messageInput');
    let currentTab = 'today';

    // Load from localStorage
    let state = JSON.parse(localStorage.getItem('joyceOS')) || {
      schedule: {
        clients: [
          { name: 'Cobalt', hours: 4, frequency: 'daily' },
          { name: 'SI', hours: 15, frequency: 'weekly' },
          { name: 'Baddie Society', hours: 5, frequency: 'weekly' },
          { name: 'Rested', hours: 5, frequency: 'weekly' }
        ],
        classes: [
          { name: 'IELTS Prep', priority: 'HIGH', target: 'Sept/Oct 2026' },
          { name: 'Security Classes', hours: 4, frequency: 'weekly' },
          { name: 'Canada Prep', hours: '2-3', frequency: 'nightly' }
        ]
      },
      tasks: [],
      messages: []
    };

    // Save to localStorage
    function saveState() {
      localStorage.setItem('joyceOS', JSON.stringify(state));
    }

    // Switch tabs
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderSidebar();
    }

    // Render sidebar
    function renderSidebar() {
      const content = document.getElementById('sidebarContent');
      if (currentTab === 'today') {
        content.innerHTML = state.tasks.length === 0 
          ? '<div class="empty-state">No tasks yet. Add one in the chat!</div>'
          : state.tasks.map((task, i) => `
              <div class="task-item high" onclick="toggleTask(${i})">
                <div class="task-text">${task.text}</div>
                <div class="task-meta">${task.category || 'task'} • ${task.priority || 'medium'}</div>
              </div>
            `).join('');
      } else {
        content.innerHTML = `
          <div>
            <p style="font-size: 12px; font-weight: 600; color: #E63384; margin-bottom: 8px;">👥 Clients</p>
            ${state.schedule.clients.map(c => `
              <div style="font-size: 12px; color: #333; margin-bottom: 6px; padding: 8px; background: #FFF0F7; border-radius: 6px;">
                <strong>${c.name}</strong> ${c.hours ? `• ${c.hours}hrs` : ''}
              </div>
            `).join('')}
            <p style="font-size: 12px; font-weight: 600; color: #E63384; margin: 12px 0 8px 0;">📚 Classes</p>
            ${state.schedule.classes.map(c => `
              <div style="font-size: 12px; color: #333; margin-bottom: 6px; padding: 8px; background: #FFF0F7; border-radius: 6px;">
                ${c.name} ${c.priority ? `(${c.priority})` : ''}
              </div>
            `).join('')}
          </div>
        `;
      }
    }

    // Handle submit
    async function handleSubmit(e) {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';

      // Add user message
      addMessage(text, 'user');

      // Show loading
      const loadingEl = document.createElement('div');
      loadingEl.className = 'message assistant';
      loadingEl.innerHTML = '<div class="loading-dots"><div class="loading-dot"></div><div class="loading-dot" style="animation-delay: 0.2s;"></div><div class="loading-dot" style="animation-delay: 0.4s;"></div></div>';
      messagesEl.appendChild(loadingEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      try {
        // Call Claude API
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: `You are Joyce's AI assistant. She's juggling Cobalt (4hrs/day), SI (15hrs/week), Baddie Society (Fridays + reviews), IELTS (HIGH PRIORITY, Sept/Oct), Security classes, and Canada Express Entry prep (nights). 

Be warm, encouraging, and real. Help her with:
- Adding/managing tasks
- Understanding her priorities
- Reminding her IELTS is the domino
- Time-blocking suggestions
- Recognizing when she's overloaded

Keep responses conversational and supportive.`,
            messages: [
              { role: 'user', content: text }
            ]
          })
        });

        const data = await response.json();
        const assistantText = data.content[0].text;

        // Remove loading
        loadingEl.remove();

        // Add assistant message
        addMessage(assistantText, 'assistant');

        // Parse for tasks if mentioned
        if (text.toLowerCase().includes('add') || text.toLowerCase().includes('task')) {
          state.tasks.push({
            text: text,
            category: 'general',
            priority: 'medium',
            completed: false
          });
          saveState();
          renderSidebar();
        }
      } catch (error) {
        loadingEl.remove();
        addMessage("Oops, let me try that again 💕", 'assistant');
      }
    }

    // Add message to chat
    function addMessage(text, role) {
      const msgEl = document.createElement('div');
      msgEl.className = `message ${role}`;
      msgEl.innerHTML = `<div class="message-bubble">${text}</div>`;
      messagesEl.appendChild(msgEl);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Toggle task
    function toggleTask(i) {
      state.tasks[i].completed = !state.tasks[i].completed;
      saveState();
      renderSidebar();
    }

    // Initialize on load
    renderSidebar();
  </script>
</body>
</html>
